<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #f8f7f4; --fg: #2a2d35; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background-color: var(--bg); color: var(--fg);
  font-family: 'Lora', Georgia, serif;
  cursor: none;
  transition: background-color 0.65s ease, color 0.65s ease;
  overflow-x: hidden;
}

/* Cursor */
#cursor { position:fixed; width:7px; height:7px; background:currentColor; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform 0.12s ease; mix-blend-mode:difference; }
#cursor.big { transform:translate(-50%,-50%) scale(3.5); opacity:0.22; }

/* Grain */
#grain { position:fixed; inset:0; pointer-events:none; z-index:997; opacity:0.028; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:140px; }

/* Landing */
#landing { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; transition:opacity 0.5s ease; }
#landing.out { opacity:0; pointer-events:none; }
#entrer-btn { background:none; border:none; cursor:none; font-family:'JetBrains Mono',monospace; font-size:0.72rem; font-weight:300; letter-spacing:0.4em; text-transform:lowercase; color:currentColor; opacity:0; animation:rise 2s ease 0.4s forwards; padding:0.5rem 0; position:relative; }
#entrer-btn::after { content:''; position:absolute; bottom:0.15rem; left:0; right:0; height:1px; background:currentColor; transform:scaleX(0); transform-origin:left; transition:transform 0.35s ease; }
#entrer-btn:hover { opacity:1 !important; }
#entrer-btn:hover::after { transform:scaleX(1); }
@keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:0.55;transform:none} }

/* Loading */
#loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:45; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#loading.on { opacity:1; }
#loading span { font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.3em; animation:blink 1.2s ease infinite; }
@keyframes blink { 0%,100%{opacity:0.15} 50%{opacity:0.5} }

/* Page */
#page { min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:8rem 2rem 6rem; opacity:0; pointer-events:none; transition:opacity 0.5s ease; }
#page.on { opacity:1; pointer-events:all; }
#content-area { width:min(820px,100%); opacity:0; transform:translateY(18px); transition:opacity 0.55s ease 0.1s, transform 0.55s ease 0.1s; }
#page.on #content-area { opacity:1; transform:none; }

/* Category tag */
#cat-tag { position:fixed; top:2.4rem; left:3rem; font-family:'JetBrains Mono',monospace; font-size:0.58rem; letter-spacing:0.35em; text-transform:uppercase; opacity:0; transition:opacity 0.5s ease 0.4s; }
#cat-tag.on { opacity:0.3; }

/* Footnote tooltip */
#fn-tip { position:fixed; max-width:260px; padding:0.75rem 0.95rem; background:currentColor; pointer-events:none; z-index:9990; opacity:0; transform:translateY(4px); transition:opacity 0.18s ease, transform 0.18s ease; }
#fn-tip span { color:var(--bg); font-family:'JetBrains Mono',monospace; font-size:0.62rem; line-height:1.65; display:block; }
#fn-tip.on { opacity:1; transform:none; }
sup.fn { font-family:'JetBrains Mono',monospace; font-size:0.58rem; cursor:none; opacity:0.42; position:relative; top:-0.45em; margin-left:0.08em; transition:opacity 0.2s ease; }
sup.fn:hover { opacity:1; }

<script>
// ═══════════════════════════════════════════════════
//  ⚙️  CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL = 'https://xmppjkvipqdidqahmhec.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EyGTa_9-6zTgl_geANgtqQ_a3ZUunF0';
// ═══════════════════════════════════════════════════

const CONFIGURED = SUPABASE_URL !== 'VOTRE_URL_SUPABASE';

const CAT = {
  essais:   { label:'essai',    bg:'#fafbfc', fg:'#222830' },
  création: { label:'création', bg:'#fcfbf8', fg:'#28261a' },
  notes:    { label:'note',     bg:'#fafcfa', fg:'#1e2a1e' },
  wip:      { label:'wip',      bg:'#fcfafa', fg:'#28201e' },
  jeu:      { label:'jeu',      bg:'#fafafa', fg:'#3a3a3a' },
};

// Pages de démo (Supabase non configuré)
const DEMO = [
  { category:'essais', type:'essay', title:'Sur l\'ennui', published:true,
    content:{ base:{ body:`<p>L'ennui est peut-être la seule émotion honnête<sup class="fn" data-note="Kierkegaard écrivait que l'ennui est la racine de tout mal.">1</sup> qu'il nous reste. Toutes les autres sont performées, affinées, postées.</p><p>Il y a une qualité d'attention dans l'ennui profond qu'on ne retrouve nulle part ailleurs.</p>` }, blocks:[] }},
  { category:'création', type:'video', title:'Court-métrage', published:true,
    content:{ base:{ vimeo_id:'148751763', description:'Un dimanche matin. Une rue vide.' }, blocks:[] }},
  { category:'notes', type:'thought', published:true,
    content:{ base:{ text:'Je me demande si la solitude est une compétence qui s\'apprend, ou juste une blessure qu\'on confond avec du caractère.', meta:'mardi soir — 23h12' }, blocks:[] }},
  { category:'notes', type:'recommendation', published:true,
    content:{ base:{ kind:'film', title:'Jeanne Dielman', author:'Chantal Akerman, 1975', description:'Trois heures et demie de tâches domestiques. Le film le plus tendu que j\'aie jamais vu.' }, blocks:[] }},
  { category:'notes', type:'recipe', title:'Risotto au citron', published:true,
    content:{ base:{ serves:'2 personnes — 35 min', ingredients:['300g de riz arborio','1L de bouillon chaud','2 citrons','80g de parmesan','50g de beurre froid'], steps:['Revenir l\'oignon à feu doux 8 min.','Nacrer le riz 2 min.','Bouillon louche par louche, 18 min.','Hors du feu : beurre, parmesan, citron.','Couvrir 2 min. Servir immédiatement.'] }, blocks:[] }},
  { category:'wip', type:'wip', title:'Roman — sans titre', published:true,
    content:{ base:{ status:'en cours depuis 14 mois', body:'Une histoire dans une ville inventée qui ressemble à Montréal.', progress:22 }, blocks:[] }},
];

let allPages = [];
let curIdx   = -1;
let deck     = [];  // pages restantes à voir
let visits   = parseInt(localStorage.getItem('vv')||'0');
let audioEl  = null;

// Cursor & footnotes
const cur = document.getElementById('cursor');
const tip = document.getElementById('fn-tip');
const tipTxt = document.getElementById('fn-text');

document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
  let x = e.clientX+20, y = e.clientY-8;
  if (x+280 > window.innerWidth) x = e.clientX-280;
  tip.style.left = x+'px'; tip.style.top = y+'px';
});
document.addEventListener('mouseover', e => {
  if (e.target.matches('button,sup.fn,a')) cur.classList.add('big');
  if (e.target.matches('sup.fn')) { tipTxt.textContent = e.target.dataset.note; tip.classList.add('on'); }
});
document.addEventListener('mouseout', e => {
  if (e.target.matches('button,sup.fn,a')) cur.classList.remove('big');
  if (e.target.matches('sup.fn')) tip.classList.remove('on');
});

async function init() {
  if (window._isPreview) { allPages = [window._previewEntry]; return; }
  if (!CONFIGURED) { allPages = DEMO; return; }
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=*&published=eq.true&order=created_at.desc`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    allPages = (Array.isArray(data) && data.length > 0) ? data : DEMO;
    deck = [];  // reset deck on load
  } catch { allPages = DEMO; }
}

async function start() {
  document.getElementById('landing').classList.add('out');
  document.getElementById('loading').classList.add('on');
  await init();
  document.getElementById('loading').classList.remove('on');
  document.getElementById('next-btn').classList.add('on');
  document.getElementById('visits').classList.add('on');
  document.getElementById('cat-tag').classList.add('on');
  nextPage();
}

function nextPage() {
  const page = document.getElementById('page');
  page.classList.remove('on');
  if (audioEl) { audioEl.pause(); audioEl = null; }
  setTimeout(() => {
    // Rebuild deck if empty (all pages seen)
    if (deck.length === 0) {
      deck = allPages.map((_,i) => i).filter(i => i !== curIdx);
      // Shuffle
      for (let i=deck.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [deck[i],deck[j]]=[deck[j],deck[i]];
      }
    }
    // Pick next from deck
    curIdx = deck.shift();
    const d = allPages[curIdx];
    const c = CAT[d.category]||CAT.notes;
    document.body.style.backgroundColor = c.bg;
    document.body.style.color = c.fg;
    document.documentElement.style.setProperty('--bg', c.bg);
    document.documentElement.style.setProperty('--fg', c.fg);
    document.getElementById('cat-tag').textContent = c.label;
    document.getElementById('content-area').innerHTML = renderEntry(d);
    if (d.type==='audio') initAudio(d);
    visits++;
    localStorage.setItem('vv', visits);
    document.getElementById('visits').textContent = visits.toString().padStart(3,'0');
    window.scrollTo(0,0);
    page.classList.add('on');
  }, 370);
}

// ── Auto-wrap paragraphs (converts double line breaks to <p> tags)
function autoParagraph(text) {
  // If text already contains <p> tags, return as-is
  if (text.includes('<p>')) return text;
  // Split on double line breaks and wrap each chunk in <p>
  return text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

// ── Render a full entry (base + blocks)
function renderEntry(d) {
  // Support both old flat structure and new {base, blocks} structure
  const base   = d.content?.base   || d.content || {};
  const blocks = d.content?.blocks || [];
  const title  = d.title || '';

  let html = renderBase(d.type, title, base);

  // Render extra blocks
  blocks.forEach(b => {
    html += `<hr class="block-sep">`;
    html += renderBlock(b);
  });

  return html;
}

// ── Game search
async function gameSearch(query) {
  const res = document.getElementById('game-search-results');
  if (!res) return;
  if (!query.trim()) { res.innerHTML = ''; return; }
  res.innerHTML = `<p class="game-search-none">recherche...</p>`;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=id,title,category&published=eq.true&title=ilike.*${encodeURIComponent(query)}*&limit=6`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) {
      res.innerHTML = `<p class="game-search-none">aucun résultat pour "${query}"</p>`; return;
    }
    res.innerHTML = data.map(e =>
      `<div class="game-search-item" onclick="goToEntry('${e.id}')">${e.title||'(sans titre)'} <span style="opacity:0.4">— ${e.category}</span></div>`
    ).join('');
  } catch(e) {
    res.innerHTML = `<p class="game-search-none">erreur — vérifie ta connexion</p>`;
  }
}

function goToEntry(id) {
  const idx = allPages.findIndex(p => p.id === id);
  if (idx !== -1) { curIdx = idx; deck = deck.filter(i => i !== idx); }
  nextPage();
}

      </div>

        <p style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;opacity:0.5;text-align:center">tu as gagné — cherche une page sur le site</p>

function initGame(visitCount) {
  const canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const fg = getComputedStyle(document.body).color;

  // Difficulty scaling
  const diff = Math.min(visitCount||0, 8);
  const BASE_SPD = 3.2 + diff * 0.25;
  const ROWS_COUNT = 5 + Math.floor(diff/2);

  const SURPRISES  = ['multiball','speed','life'];
  const SUR_COLORS = { multiball:'#f5c842', speed:'#5b9bd5', life:'#e07ab0' };
  const BRICK_BASE = '#8a8a8a';

  const PAD = { w:80, h:3, y:H-28, x:W/2-40 };
  const COLS=10, ROWS=Math.min(ROWS_COUNT,8), BW=44, BH=10, BPAD=5;
  const offX=(W-(COLS*(BW+BPAD)-BPAD))/2, offY=40;

  let balls=[], bricks=[], drops=[], particles=[];
  let score=0, lives=3, state='idle', speedMult=1;

  const makeBricks = () => {
    bricks=[];
    const total=COLS*ROWS, surpriseSet=new Set();
    const cnt=4+Math.floor(Math.random()*3);
    while(surpriseSet.size<cnt) surpriseSet.add(Math.floor(Math.random()*total));
    for(let r=0;r<ROWS;r++)
      for(let c2=0;c2<COLS;c2++){
        const idx=r*COLS+c2;
        const stype=surpriseSet.has(idx)?SURPRISES[Math.floor(Math.random()*3)]:null;
        bricks.push({x:offX+c2*(BW+BPAD), y:offY+r*(BH+BPAD), alive:true, surprise:stype});
      }
  };

  const spd=()=>BASE_SPD*speedMult;
  const makeBall=(x,y,dx,dy)=>({x,y,r:4,dx,dy});
  const resetBalls=()=>{ speedMult=1; balls=[makeBall(PAD.x+PAD.w/2,PAD.y-6,2.8,-spd())]; };

  makeBricks(); resetBalls();

  const setMsg  =t=>{ const m=document.getElementById('g-msg');   if(m) m.textContent=t; };
  const setScore=()=>{ const s=document.getElementById('g-score'); if(s) s.textContent=`score — ${score}`; };

  const showSearch = () => {
    const w = document.getElementById('game-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('game-search-input')?.focus(); }
  };

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    PAD.x=Math.max(0,Math.min(W-PAD.w,e.clientX-r.left-PAD.w/2));
    if(state==='idle') balls.forEach(b=>{b.x=PAD.x+PAD.w/2; b.y=PAD.y-b.r-2;});
  });
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    PAD.x=Math.max(0,Math.min(W-PAD.w,e.touches[0].clientX-r.left-PAD.w/2));
    if(state==='idle') balls.forEach(b=>{b.x=PAD.x+PAD.w/2; b.y=PAD.y-b.r-2;});
  },{passive:false});
  canvas.addEventListener('click',()=>{
    if(state==='idle'){ state='playing'; setMsg(''); }
    else if(state==='dead'||state==='win'){
      score=0; lives=3; state='idle'; speedMult=1;
      makeBricks(); resetBalls(); drops=[]; particles=[];
      setScore(); setMsg('cliquer pour commencer');
      const w=document.getElementById('game-search-wrap'); if(w) w.style.display='none';
    }
  });
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(state==='idle'){ state='playing'; setMsg(''); }
    else if(state==='dead'||state==='win'){
      score=0; lives=3; state='idle'; speedMult=1;
      makeBricks(); resetBalls(); drops=[]; particles=[];
      setScore(); setMsg('cliquer pour commencer');
      const w=document.getElementById('game-search-wrap'); if(w) w.style.display='none';
    }
  },{passive:false});

  function spawnParticles(x,y,col){
    for(let i=0;i<7;i++){
      const a=Math.random()*Math.PI*2,s=0.8+Math.random()*1.8;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,size:1.5+Math.random()*2,color:col||fg});
    }
  }

  function activateSurprise(type){
    if(type==='multiball'){
      const count=2+Math.floor(Math.random()*3);
      const src=balls[0]||makeBall(W/2,H/2,2.8,-spd());
      for(let i=0;i<count;i++){
        const angle=(Math.random()*Math.PI*0.9)-Math.PI*0.45-Math.PI/2;
        const s=spd()+Math.random()*0.5;
        balls.push(makeBall(src.x,src.y,Math.cos(angle)*s,Math.sin(angle)*s));
      }
    } else if(type==='speed'){
      speedMult=2.2;
      balls.forEach(b=>{const s=Math.sqrt(b.dx*b.dx+b.dy*b.dy)||1; b.dx=b.dx/s*spd(); b.dy=b.dy/Math.abs(b.dy||1)*spd();});
      setTimeout(()=>{speedMult=1; balls.forEach(b=>{const s=Math.sqrt(b.dx*b.dx+b.dy*b.dy)||1; b.dx=b.dx/s*BASE_SPD; b.dy=b.dy/Math.abs(b.dy||1)*BASE_SPD;});}, 6000);
    } else if(type==='life'){
      lives=Math.min(lives+1,5);
    }
  }

  function updateBall(ball){
    ball.x+=ball.dx; ball.y+=ball.dy;
    if(ball.x-ball.r<=0||ball.x+ball.r>=W) ball.dx*=-1;
    if(ball.y-ball.r<=0) ball.dy*=-1;
    if(ball.dy>0&&ball.y+ball.r>=PAD.y&&ball.y+ball.r<=PAD.y+PAD.h+6&&ball.x>=PAD.x&&ball.x<=PAD.x+PAD.w){
      ball.dy=-Math.abs(ball.dy);
      ball.dx=((ball.x-(PAD.x+PAD.w/2))/(PAD.w/2))*3.8*speedMult;
    }
    for(let b of bricks){
      if(!b.alive) continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){
        b.alive=false; ball.dy*=-1; score+=10; setScore();
        const col=b.surprise?SUR_COLORS[b.surprise]:null;
        spawnParticles(b.x+BW/2,b.y+BH/2,col);
        if(b.surprise) drops.push({x:b.x+BW/2-6,y:b.y,w:12,h:8,dy:1.6,type:b.surprise,color:SUR_COLORS[b.surprise]});
      }
    }
    return ball.y<=H+20;
  }

  function update(){
    if(state!=='playing') return;
    balls=balls.filter(b=>updateBall(b));
    if(balls.length===0){
      lives--;
      if(lives<=0){ state='dead'; setMsg('game over — cliquer pour rejouer'); return; }
      state='idle'; speedMult=1; resetBalls();
      setMsg(`${lives} vie${lives>1?'s':''} — cliquer pour relancer`);
    }
    drops.forEach(d=>{d.y+=d.dy;});
    drops=drops.filter(d=>{
      if(d.y+d.h>=PAD.y&&d.y<=PAD.y+PAD.h+4&&d.x+d.w>=PAD.x&&d.x<=PAD.x+PAD.w){
        activateSurprise(d.type); return false;
      }
      return d.y<H+20;
    });
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.055;});
    if(bricks.every(b=>!b.alive)){
      state='win';
      setMsg('gagné ! cherche quelque chose →');
      showSearch();
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=fg; ctx.globalAlpha=0.75;
    ctx.fillRect(PAD.x,PAD.y,PAD.w,PAD.h);
    balls.forEach(ball=>{
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
      ctx.fillStyle=speedMult>1?SUR_COLORS.speed:fg;
      ctx.globalAlpha=0.9; ctx.fill();
    });
    bricks.forEach(b=>{
      if(!b.alive) return;
      ctx.fillStyle=BRICK_BASE; ctx.globalAlpha=0.52;
      ctx.fillRect(b.x,b.y,BW,BH);
    });
    drops.forEach(d=>{
      ctx.fillStyle=d.color; ctx.globalAlpha=0.92;
      ctx.fillRect(d.x,d.y,d.w,d.h);
    });
    particles.forEach(p=>{
      ctx.globalAlpha=p.life*0.7; ctx.fillStyle=p.color||fg;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    });
    for(let i=0;i<lives;i++){
      ctx.beginPath(); ctx.arc(12+i*14,H-10,2.5,0,Math.PI*2);
      ctx.globalAlpha=0.22; ctx.fillStyle=fg; ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  if(window._gameAnimId) cancelAnimationFrame(window._gameAnimId);
  function loop(){ update(); draw(); window._gameAnimId=requestAnimationFrame(loop); }
  loop();
}

  localStorage.setItem('snake-visits', visits+1);

    <div class="game-wrap">
      <h1 class="game-title">${title||'snake'}</h1>

        <input class="game-search-input" id="snake-search-input" placeholder="un mot, un sujet..." oninput="gameSearch(this.value)">

function initSnake(visitCount) {
  const canvas = document.getElementById('snake-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const fg = getComputedStyle(document.body).color;

  // Difficulty: speed increases with visits
  const diff = Math.min(visitCount||0, 8);
  const SPEED = Math.max(70, 130 - diff * 8);
  const CELL = 20, COLS = W/CELL, ROWS = H/CELL;

  let snake, dir, nextDir, food, score, state, interval;

  function reset() {
    snake = [{x:Math.floor(COLS/2), y:Math.floor(ROWS/2)}];
    dir = {x:1, y:0}; nextDir = {x:1, y:0};
    food = spawnFood();
    score = 0; state = 'idle';
    setMsg('cliquer pour commencer');
    setScore();
  }

  function spawnFood() {
    // Find all free cells
    const occupied = new Set(snake.map(s=>`${s.x},${s.y}`));
    const free = [];
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) if(!occupied.has(`${x},${y}`)) free.push({x,y});
    if(free.length===0) return null; // grid full — win!
    return free[Math.floor(Math.random()*free.length)];
  }

  const setMsg   = t => { const m=document.getElementById('s-msg');   if(m) m.textContent=t; };
  const setScore = () => { const s=document.getElementById('s-score'); if(s) s.textContent=`score — ${score}`; };

  const showSearch = () => {
    const w = document.getElementById('snake-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('snake-search-input')?.focus(); }
  };

  canvas.addEventListener('click', () => {
    if (state==='idle') { state='playing'; setMsg(''); startLoop(); }
    else if (state==='dead'||state==='win') {
      clearInterval(interval); reset();
      const w=document.getElementById('snake-search-wrap'); if(w) w.style.display='none';
    }
  });

  document.addEventListener('keydown', e => {
    if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
    e.preventDefault();
    const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const scaleX = W / r.width, scaleY = H / r.height;
    const tx = (e.touches[0].clientX - r.left) * scaleX;
    const ty = (e.touches[0].clientY - r.top) * scaleY;
    const head = snake[0];
    const dx = tx - head.x * CELL, dy = ty - head.y * CELL;
    let nd;
    if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    else nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    if (state==='idle') { state='playing'; setMsg(''); startLoop(); }
    else if (state==='dead'||state==='win') {
      clearInterval(interval); reset();
      const w=document.getElementById('snake-search-wrap'); if(w) w.style.display='none';
    }
  }, {passive:false});

  function startLoop() { interval = setInterval(tick, SPEED); }

  function tick() {
    dir = nextDir;
    const head = {x: (snake[0].x+dir.x+COLS)%COLS, y: (snake[0].y+dir.y+ROWS)%ROWS};
    if (snake.some(s=>s.x===head.x&&s.y===head.y)) {
      state='dead'; clearInterval(interval);
      setMsg('game over — cliquer pour rejouer'); return;
    }
    snake.unshift(head);
    if (food && head.x===food.x && head.y===food.y) {
      score+=10; setScore();
      food = spawnFood();
      if (!food) {
        // Grid full = win!
        state='win'; clearInterval(interval);
        setMsg('gagné ! cherche quelque chose →');
        showSearch(); return;
      }
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    if (food) {
      ctx.fillStyle = fg; ctx.globalAlpha = 0.55;
      ctx.beginPath();
      ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL*0.22, 0, Math.PI*2);
      ctx.fill();
    }
    snake.forEach((s, i) => {
      ctx.globalAlpha = i===0 ? 0.85 : 0.4 + (1-i/snake.length)*0.4;
      ctx.fillStyle = fg;
      const gap = 2;
      ctx.fillRect(s.x*CELL+gap, s.y*CELL+gap, CELL-gap*2, CELL-gap*2);
    });
    ctx.globalAlpha = 1;
  }

  reset(); draw();
  if (window._snakeInterval) clearInterval(window._snakeInterval);
  window._snakeInterval = interval;
}

// ── Audio
function initAudio(d) {
  audioEl = document.getElementById('audio-el');
  if (!audioEl) return;
  audioEl.addEventListener('timeupdate', () => {
    if (!audioEl.duration) return;
    const pct = (audioEl.currentTime/audioEl.duration)*100;
    const f = document.getElementById('pfill');
    const t = document.getElementById('atime');
    if (f) f.style.width = pct+'%';
    if (t) t.textContent = `${fmt(audioEl.currentTime)} / ${fmt(audioEl.duration)}`;
  });
  audioEl.addEventListener('ended', () => setIcon(false));
}
function togglePlay() {
  if (!audioEl) return;
  if (audioEl.paused) {
    audioEl.play().then(() => setIcon(true)).catch(e => console.log('audio error:', e));
  } else {
    audioEl.pause();
    setIcon(false);
  }
}
function seekAudio(e) {
  if (!audioEl||!audioEl.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX-r.left)/r.width)*audioEl.duration;
}
function setIcon(p) {
  const ico = document.getElementById('play-icon');
  if (!ico) return;
  ico.innerHTML = p ? '<rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/>' : '<polygon points="0,0 10,6 0,12"/>';
}
function fmt(s) {
  if (!s||isNaN(s)) return '—:——';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
</script>
