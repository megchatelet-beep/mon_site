  if (e.target.matches('sup.fn')) tip.classList.remove('on');
});

async function init() {
  if (window._isPreview) { allPages = [window._previewEntry]; return; }
  if (!CONFIGURED) { allPages = DEMO; return; }
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=*&published=eq.true&order=created_at.desc`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    allPages = (Array.isArray(data) && data.length > 0) ? data : DEMO;
    deck = [];  // reset deck on load
  } catch { allPages = DEMO; }
}

async function start() {
  document.getElementById('landing').classList.add('out');
  document.getElementById('loading').classList.add('on');
  await init();
  document.getElementById('loading').classList.remove('on');
  document.getElementById('next-btn').classList.add('on');
  document.getElementById('visits').classList.add('on');
  document.getElementById('cat-tag').classList.add('on');
  nextPage();
}

function nextPage() {
  const page = document.getElementById('page');
  page.classList.remove('on');
  if (audioEls.length) { audioEls.forEach(a => a && a.pause()); audioEls = []; }
  // Clean up games
  if (window._snakeInterval) { clearInterval(window._snakeInterval); window._snakeInterval = null; }
  if (window._gameAnimId) { cancelAnimationFrame(window._gameAnimId); window._gameAnimId = null; }
  // Remove snake keydown listener
  if (window._snakeKeyHandler) { document.removeEventListener('keydown', window._snakeKeyHandler); window._snakeKeyHandler = null; }
  setTimeout(() => {
    // Rebuild deck if empty (all pages seen)
    if (deck.length === 0) {
      deck = allPages.map((_,i) => i).filter(i => i !== curIdx);
      // Shuffle
      for (let i=deck.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [deck[i],deck[j]]=[deck[j],deck[i]];
      }
    }
    // Pick next — avoid same category as current, avoid game as first
    const curCat = curIdx >= 0 ? allPages[curIdx]?.category : null;
    const isFirst = curIdx === -1;
    let picked = deck.findIndex(i => {
      const cat = allPages[i]?.category;
      if (isFirst && cat === 'jeu') return false;
      if (cat === curCat) return false;
      return true;
    });
    if (picked === -1) picked = 0;
    curIdx = deck.splice(picked, 1)[0];
    const d = allPages[curIdx];
    const c = CAT[d.category]||CAT.notes;
    document.body.style.backgroundColor = c.bg;
    document.body.style.color = c.fg;
    document.documentElement.style.setProperty('--bg', c.bg);
    document.documentElement.style.setProperty('--fg', c.fg);
    document.getElementById('cat-tag').textContent = c.label;
    document.getElementById('content-area').innerHTML = renderEntry(d);
    if (d.type==='audio') initAudio(d);
    visits++;
    localStorage.setItem('vv', visits);
    document.getElementById('visits').textContent = visits.toString().padStart(3,'0');
    window.scrollTo(0,0);
    page.classList.add('on');
  }, 370);
}

// ── Auto-wrap paragraphs (converts double line breaks to <p> tags)
function autoParagraph(text) {
  // If text already contains <p> tags, return as-is
  if (text.includes('<p>')) return text;
  // Split on double line breaks and wrap each chunk in <p>
  return text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

// ── Render a full entry (base + blocks)
function renderEntry(d) {
  // Support both old flat structure and new {base, blocks} structure
  const base   = d.content?.base   || d.content || {};
  const blocks = d.content?.blocks || [];
  const title  = d.title || '';

  let html = renderBase(d.type, title, base);

  // Render extra blocks
  blocks.forEach(b => {
    html += `<hr class="block-sep">`;
    html += renderBlock(b);
  });

  return html;
}

function renderBase(type, title, c) {
  if (type==='essay')
    return `<h1 class="essay-title">${title}</h1><p class="fiction-genre">essay</p><div class="essay-body">${autoParagraph(c.body||'')}</div>`;
  if (type==='fiction')
    return `<h1 class="fiction-title">${title}</h1>${c.genre?`<p class="fiction-genre">${c.genre}</p>`:`<p class="fiction-genre">fiction</p>`}<div class="fiction-body">${autoParagraph(c.body||'')}</div>`;
  if (type==='poeme')
    return `${(c.title||title)?`<h1 class="poeme-title">${c.title||title}</h1>`:''}<p class="fiction-genre">poetry</p><p class="poeme-body">${c.body||''}</p>`;
  if (type==='video')
    return `<p class="video-title">${title}</p><div class="video-wrap"><iframe src="https://player.vimeo.com/video/${c.vimeo_id}?color=ffffff&title=0&byline=0&portrait=0&dnt=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div><p class="video-desc">${c.description||''}</p>`;
  if (type==='audio') {
    const ablocks = c.ablocks || [];
    // Legacy support
    if (!ablocks.length && c.audio_url) {
      return `<h1 class="audio-page-title">${title}</h1><div class="audio-player"><button class="play-btn" id="play-btn-0" onclick="toggleAudioPlay(0)"><svg id="play-icon-0" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></button><div class="audio-info"><div class="track-name">${c.track_title||''}</div><div class="progress-bar" onclick="seekAudio(event,0)"><div class="progress-fill" id="pfill-0"></div></div><div class="audio-time" id="atime-0">0:00 / —:——</div></div></div><audio id="audio-el-0" preload="metadata" src="${c.audio_url}"></audio>`;
    }
    let html = `<h1 class="audio-page-title">${title}</h1>`;
    ablocks.forEach((b, i) => {
      if (b.type==='audio') {
        html += `<div class="audio-player">
          <button class="play-btn" id="play-btn-${i}" onclick="toggleAudioPlay(${i})">
            <svg id="play-icon-${i}" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
          </button>
          <div class="audio-info">
            ${b.track ? `<div class="track-name">${b.track}</div>` : ''}
            <div class="progress-bar" onclick="seekAudio(event,${i})"><div class="progress-fill" id="pfill-${i}"></div></div>
            <div class="audio-time" id="atime-${i}">0:00 / —:——</div>
          </div>
        </div>
        <audio id="audio-el-${i}" preload="metadata" src="${b.url||''}"></audio>`;
      } else if (b.type==='image') {
        html += `<div class="image-wrap" style="margin:1.2rem 0"><img src="${b.url||''}" alt=""></div>`;
        if (b.caption) html += `<p class="image-caption">${b.caption}</p>`;
      } else if (b.type==='text') {
        html += `<div class="block-text" style="margin:1.2rem 0">${b.html||''}</div>`;
      }
    });
    setTimeout(() => initMultiAudio(ablocks.length || 1), 50);
    return html;
  }
  if (type==='image') {
    const imgs = c.images || (c.image_url ? [c.image_url] : []);
    const cap = c.caption ? `<p class="image-caption">${c.caption}</p>` : '';
    if (imgs.length === 1) {
      return `<div class="image-wrap"><img src="${imgs[0]}" alt=""></div>${cap}`;
    }
    return `<div class="image-auto-grid">${imgs.map(s=>`<img src="${s}" alt="">`).join('')}</div>${cap}`;
  }  if (type==='bd')
    return `<p class="bd-title">${title}</p><div class="bd-images">${(c.images||[]).map(s=>`<img src="${s}" alt="">`).join('')}</div>${c.note?`<p class="bd-note">${c.note}</p>`:''}`;
  if (type==='projet') {
    const tags = (c.tags||[]).map(t=>`<span class="projet-tag">${t}</span>`).join('');
    return `<h1 class="projet-title">${title}</h1><div class="projet-tags">${tags}</div><p class="projet-desc">${c.description||''}</p>${c.link?`<a class="projet-link" href="${c.link}" target="_blank">voir le projet →</a>`:''}`;
  }
  if (type==='thought')
    return `<p class="thought-text">"${c.text||''}"</p>${c.meta?`<p class="thought-meta">${c.meta}</p>`:''}`;
  if (type==='citation')
    return `<blockquote class="citation-wrap"><p class="citation-text">${c.text||''}</p><p class="citation-source">— ${c.source||''}</p></blockquote>`;
  if (type==='lien')
    return `<p class="lien-url">${c.url||''}</p><h1 class="lien-title">${c.title||title}</h1><p class="lien-comment">${c.comment||''}</p>${c.url?`<a class="lien-btn" href="${c.url}" target="_blank">ouvrir le lien →</a>`:''}`;
  if (type==='recommendation')
    return `<p class="reco-kind">${c.kind||''}</p><h1 class="reco-title">${c.title||title}</h1><p class="reco-author">${c.author||''}</p><p class="reco-desc">${c.description||''}</p>`;
  if (type==='musique') {
    const t = c.title||title||'';
    const artist = c.artist ? `<p class="musique-artist">${c.artist}</p>` : '';
    const img = c.image_url ? `<div class="musique-img"><img src="${c.image_url}" alt="${t}"></div>` : '';
    const player = c.sc_url ? `<iframe class="musique-player" scrolling="no" frameborder="no" allow="autoplay" src="${c.sc_url}"></iframe>` : '';
    return `<h1 class="playlist-title">${t}</h1>${artist}${img}${player}${c.note?`<p class="playlist-note" style="margin-top:1rem">${c.note}</p>`:''}`;
  }  if (type==='recipe') {
    const ings  = (c.ingredients||[]).map(i=>`<li>${i}</li>`).join('');
    const steps = (c.steps||[]).map(s=>`<li>${s}</li>`).join('');
    return `<h1 class="recipe-title">${title}</h1>${c.serves?`<p class="recipe-serves">${c.serves}</p>`:''}<p class="recipe-sec">ingrédients</p><ul class="ing-list">${ings}</ul><p class="recipe-sec">étapes</p><ol class="step-list">${steps}</ol>`;
  }
  if (type==='wip')
    return `<h1 class="wip-title">${title}</h1>${c.status?`<p class="wip-status">${c.status}</p>`:''}<div class="wip-bar"><div class="wip-fill" style="width:${c.progress||0}%"></div><div class="wip-dot" style="left:${c.progress||0}%"></div></div><p class="wip-pct">${c.progress||0}%</p><p class="wip-body" style="margin-top:2rem">${c.body||''}</p>`;
  if (type==='libre')
    return title ? `<h1 class="essay-title">${title}</h1>` : '';
  if (type==='typing')
    return renderTyping(title);
  if (type==='memoire')
    return renderMemoire(title);
  if (type==='jeu2048')
    return render2048(title);
  if (type==='snake')
    return renderSnake(title);
  if (type==='jeu')
    return renderGame(title, c);
  return '';
}

function renderBlock(b) {
  const d = b.data || {};
  if (b.type==='text')
    return `<div class="block-text">${d.html||''}</div>`;
  if (b.type==='image') {
    const imgs = d.images || (d.url ? [d.url] : []);
    const cap = d.caption ? `<p class="image-caption">${d.caption}</p>` : '';
    if (!imgs.length) return '';
    if (imgs.length===1) return `<div class="image-wrap"><img src="${imgs[0]}" alt=""></div>${cap}`;
    return `<div class="image-auto-grid">${imgs.map(s=>`<img src="${s}" alt="">`).join('')}</div>${cap}`;
  }

  if (b.type==='video')
    return `<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${d.vimeo_id}?color=ffffff&title=0&byline=0&portrait=0&dnt=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>${d.description?`<p class="video-desc">${d.description}</p>`:''}`;
  if (b.type==='audio')
    return `<div class="audio-player"><button class="play-btn" onclick="togglePlay()"><svg id="play-icon" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></button><div class="audio-info"><div class="track-name">${d.track_title||''}</div><div class="progress-bar" onclick="seekAudio(event)"><div class="progress-fill" id="pfill"></div></div><div class="audio-time" id="atime">0:00 / —:——</div></div></div><audio id="audio-el" preload="none" src="${d.audio_url||''}"></audio>`;
  return '';
}

// ── Game search
async function gameSearch(query) {
  const res = document.getElementById('game-search-results');
  if (!res) return;
  if (!query.trim()) { res.innerHTML = ''; return; }
  res.innerHTML = `<p class="game-search-none">searching...</p>`;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pages?select=id,title,category,content&published=eq.true&limit=50`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    if (!Array.isArray(data)) { res.innerHTML = `<p class="game-search-none">erreur</p>`; return; }
    const ql = query.toLowerCase();
    const matches = data.filter(e => {
      const titleMatch = (e.title||'').toLowerCase().includes(ql);
      const keywords = e.content?.base?.keywords || e.content?.keywords || [];
      const kwMatch = Array.isArray(keywords) && keywords.some(k => k.toLowerCase().includes(ql));
      return titleMatch || kwMatch;
    });
    if (!matches.length) { res.innerHTML = `<p class="game-search-none">no results for "${query}"</p>`; return; }
    res.innerHTML = matches.slice(0,6).map(e =>
      `<div class="game-search-item" onclick="goToEntry('${e.id}')">${e.title||'(sans titre)'} <span style="opacity:0.4">— ${e.category}</span></div>`
    ).join('');
  } catch(e) {
    res.innerHTML = `<p class="game-search-none">error — check your connection</p>`;
  }
}

async function goToEntry(id) {
  // Load the specific entry from Supabase and display it directly
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pages?id=eq.${id}&select=*`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` }
    });
    const data = await r.json();
    if (!data || !data[0]) return;
    const d = data[0];
    const c = CAT[d.category]||CAT.notes;
    const page = document.getElementById('page');
    page.classList.remove('on');
    setTimeout(() => {
      document.body.style.backgroundColor = c.bg;
      document.body.style.color = c.fg;
      document.documentElement.style.setProperty('--bg', c.bg);
      document.documentElement.style.setProperty('--fg', c.fg);
      document.getElementById('cat-tag').textContent = c.label;
      document.getElementById('content-area').innerHTML = renderEntry(d);
      // Add to allPages if not there
      const idx = allPages.findIndex(p => p.id === id);
      if (idx === -1) { allPages.push(d); curIdx = allPages.length-1; }
      else { curIdx = idx; deck = deck.filter(i => i !== idx); }
      window.scrollTo(0,0);
      page.classList.add('on');
    }, 370);
  } catch(e) {
    nextPage(); // fallback
  }
}

// ── Game (Brick Breaker)
function renderGame(title, c) {
  const subtitle = c.subtitle || '';
  const visits = parseInt(localStorage.getItem('bb-visits')||'0');
  localStorage.setItem('bb-visits', visits+1);
  setTimeout(() => initGame(visits), 80);
  return `
    <div class="game-wrap">
      <h1 class="game-title">${title}</h1>
      ${subtitle ? `<p class="game-subtitle">${subtitle}</p>` : ''}
      <p class="game-score" id="g-score">score — 0</p>
      <div class="game-canvas-wrap">
        <canvas id="game-canvas" width="520" height="400"></canvas>
      </div>
      <p class="game-msg" id="g-msg">click to start</p>
      <div class="game-search" id="game-search-wrap" style="display:none">
        <p style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;opacity:0.5;text-align:center">you won — search for something →</p>
        <input class="game-search-input" id="game-search-input" placeholder="a word, a topic..." oninput="gameSearch(this.value)">
        <div class="game-search-results" id="game-search-results"></div>
      </div>
    </div>`;
}

function initGame(visitCount) {
  const canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const fg = getComputedStyle(document.body).color;

  // Difficulty scaling
  const diff = Math.min(visitCount||0, 8);
  const BASE_SPD = 3.2 + diff * 0.25;
  const ROWS_COUNT = 5 + Math.floor(diff/2);

  const SURPRISES  = ['multiball','speed','life'];
  const SUR_COLORS = { multiball:'#f5c842', speed:'#5b9bd5', life:'#e07ab0' };
  const BRICK_BASE = '#8a8a8a';

  const PAD = { w:80, h:3, y:H-28, x:W/2-40 };
  const COLS=10, ROWS=Math.min(ROWS_COUNT,8), BW=44, BH=10, BPAD=5;
  const offX=(W-(COLS*(BW+BPAD)-BPAD))/2, offY=40;

  let balls=[], bricks=[], drops=[], particles=[];
  let score=0, lives=3, state='idle', speedMult=1;

  const makeBricks = () => {
    bricks=[];
    const total=COLS*ROWS, surpriseSet=new Set();
    const cnt=4+Math.floor(Math.random()*3);
    while(surpriseSet.size<cnt) surpriseSet.add(Math.floor(Math.random()*total));
    for(let r=0;r<ROWS;r++)
      for(let c2=0;c2<COLS;c2++){
        const idx=r*COLS+c2;
        const stype=surpriseSet.has(idx)?SURPRISES[Math.floor(Math.random()*3)]:null;
        bricks.push({x:offX+c2*(BW+BPAD), y:offY+r*(BH+BPAD), alive:true, surprise:stype});
      }
  };

  const spd=()=>BASE_SPD*speedMult;
  const makeBall=(x,y,dx,dy)=>({x,y,r:4,dx,dy});
  const resetBalls=()=>{ speedMult=1; balls=[makeBall(PAD.x+PAD.w/2,PAD.y-6,2.8,-spd())]; };

  makeBricks(); resetBalls();

  const setMsg  =t=>{ const m=document.getElementById('g-msg');   if(m) m.textContent=t; };
  const setScore=()=>{ const s=document.getElementById('g-score'); if(s) s.textContent=`score — ${score}`; };

  const showSearch = () => {
    const w = document.getElementById('game-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('game-search-input')?.focus(); }
  };

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    PAD.x=Math.max(0,Math.min(W-PAD.w,e.clientX-r.left-PAD.w/2));
    if(state==='idle') balls.forEach(b=>{b.x=PAD.x+PAD.w/2; b.y=PAD.y-b.r-2;});
  });
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const scaleX = W / r.width;
    const tx = (e.touches[0].clientX - r.left) * scaleX;
    PAD.x=Math.max(0,Math.min(W-PAD.w, tx - PAD.w/2));
    if(state==='idle') balls.forEach(b=>{b.x=PAD.x+PAD.w/2; b.y=PAD.y-b.r-2;});
  },{passive:false});
  canvas.addEventListener('click',()=>{
    if(state==='idle'){ state='playing'; setMsg(''); }
    else if(state==='dead'||state==='win'){
      score=0; lives=3; state='idle'; speedMult=1;
      makeBricks(); resetBalls(); drops=[]; particles=[];
      setScore(); setMsg('click to start');
      const w=document.getElementById('game-search-wrap'); if(w) w.style.display='none';
    }
  });
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(state==='idle'){ state='playing'; setMsg(''); }
    else if(state==='dead'||state==='win'){
      score=0; lives=3; state='idle'; speedMult=1;
      makeBricks(); resetBalls(); drops=[]; particles=[];
      setScore(); setMsg('click to start');
      const w=document.getElementById('game-search-wrap'); if(w) w.style.display='none';
    }
  },{passive:false});

  function spawnParticles(x,y,col){
    for(let i=0;i<7;i++){
      const a=Math.random()*Math.PI*2,s=0.8+Math.random()*1.8;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,size:1.5+Math.random()*2,color:col||fg});
    }
  }

  function activateSurprise(type){
    if(type==='multiball'){
      const count=2+Math.floor(Math.random()*3);
      const src=balls[0]||makeBall(W/2,H/2,2.8,-spd());
      for(let i=0;i<count;i++){
        const angle=(Math.random()*Math.PI*0.9)-Math.PI*0.45-Math.PI/2;
        const s=spd()+Math.random()*0.5;
        balls.push(makeBall(src.x,src.y,Math.cos(angle)*s,Math.sin(angle)*s));
      }
    } else if(type==='speed'){
      speedMult=2.2;
      balls.forEach(b=>{const s=Math.sqrt(b.dx*b.dx+b.dy*b.dy)||1; b.dx=b.dx/s*spd(); b.dy=b.dy/Math.abs(b.dy||1)*spd();});
      setTimeout(()=>{speedMult=1; balls.forEach(b=>{const s=Math.sqrt(b.dx*b.dx+b.dy*b.dy)||1; b.dx=b.dx/s*BASE_SPD; b.dy=b.dy/Math.abs(b.dy||1)*BASE_SPD;});}, 6000);
    } else if(type==='life'){
      lives=Math.min(lives+1,5);
    }
  }

  function updateBall(ball){
    ball.x+=ball.dx; ball.y+=ball.dy;
    if(ball.x-ball.r<=0||ball.x+ball.r>=W) ball.dx*=-1;
    if(ball.y-ball.r<=0) ball.dy*=-1;
    if(ball.dy>0&&ball.y+ball.r>=PAD.y&&ball.y+ball.r<=PAD.y+PAD.h+6&&ball.x>=PAD.x&&ball.x<=PAD.x+PAD.w){
      ball.dy=-Math.abs(ball.dy);
      ball.dx=((ball.x-(PAD.x+PAD.w/2))/(PAD.w/2))*3.8*speedMult;
    }
    for(let b of bricks){
      if(!b.alive) continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){
        b.alive=false; ball.dy*=-1; score+=10; setScore();
        const col=b.surprise?SUR_COLORS[b.surprise]:null;
        spawnParticles(b.x+BW/2,b.y+BH/2,col);
        if(b.surprise) drops.push({x:b.x+BW/2-6,y:b.y,w:12,h:8,dy:1.6,type:b.surprise,color:SUR_COLORS[b.surprise]});
      }
    }
    return ball.y<=H+20;
  }

  function update(){
    if(state!=='playing') return;
    balls=balls.filter(b=>updateBall(b));
    if(balls.length===0){
      lives--;
      if(lives<=0){ state='dead'; setMsg('game over — tap to play again'); return; }
      state='idle'; speedMult=1; resetBalls();
      setMsg(`${lives} ${lives>1?'lives':'life'} — tap to relaunch`);
    }
    drops.forEach(d=>{d.y+=d.dy;});
    drops=drops.filter(d=>{
      if(d.y+d.h>=PAD.y&&d.y<=PAD.y+PAD.h+4&&d.x+d.w>=PAD.x&&d.x<=PAD.x+PAD.w){
        activateSurprise(d.type); return false;
      }
      return d.y<H+20;
    });
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.055;});
    if(bricks.every(b=>!b.alive)){
      state='win';
      setMsg('you won — search for something →');
      showSearch();
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=fg; ctx.globalAlpha=0.75;
    ctx.fillRect(PAD.x,PAD.y,PAD.w,PAD.h);
    balls.forEach(ball=>{
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
      ctx.fillStyle=speedMult>1?SUR_COLORS.speed:fg;
      ctx.globalAlpha=0.9; ctx.fill();
    });
    bricks.forEach(b=>{
      if(!b.alive) return;
      ctx.fillStyle=BRICK_BASE; ctx.globalAlpha=0.52;
      ctx.fillRect(b.x,b.y,BW,BH);
    });
    drops.forEach(d=>{
      ctx.fillStyle=d.color; ctx.globalAlpha=0.92;
      ctx.fillRect(d.x,d.y,d.w,d.h);
    });
    particles.forEach(p=>{
      ctx.globalAlpha=p.life*0.7; ctx.fillStyle=p.color||fg;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    });
    for(let i=0;i<lives;i++){
      ctx.beginPath(); ctx.arc(12+i*14,H-10,2.5,0,Math.PI*2);
      ctx.globalAlpha=0.22; ctx.fillStyle=fg; ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  if(window._gameAnimId) cancelAnimationFrame(window._gameAnimId);
  function loop(){ update(); draw(); window._gameAnimId=requestAnimationFrame(loop); }
  loop();
}

function renderSnake(title) {
  const visits = parseInt(localStorage.getItem('snake-visits')||'0');
  localStorage.setItem('snake-visits', visits+1);
  setTimeout(() => initSnake(visits), 80);

    <div class="game-wrap">
      <h1 class="game-title">${title||'snake'}</h1>
      <p class="game-score" id="s-score">score — 0</p>

        <canvas id="snake-canvas" width="520" height="520"></canvas>
      </div>
      <p class="game-msg" id="s-msg">click to start</p>
      <div class="game-search" id="snake-search-wrap" style="display:none">
        <p style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;opacity:0.5;text-align:center">you won — search for something →</p>
        <input class="game-search-input" id="snake-search-input" placeholder="a word, a topic..." oninput="gameSearch(this.value)">
        <div class="game-search-results" id="game-search-results"></div>

    </div>`;

function initSnake(visitCount) {
  const canvas = document.getElementById('snake-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const fg = getComputedStyle(document.body).color;

  // Difficulty: speed increases with visits
  const diff = Math.min(visitCount||0, 8);
  const SPEED = Math.max(70, 130 - diff * 8);
  const CELL = 20, COLS = W/CELL, ROWS = H/CELL;

  let snake, dir, nextDir, food, score, state, interval;

  function reset() {
    snake = [{x:Math.floor(COLS/2), y:Math.floor(ROWS/2)}];
    dir = {x:1, y:0}; nextDir = {x:1, y:0};
    food = spawnFood();
    score = 0; state = 'idle';
    setMsg('click to start');
    setScore();
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s=>`${s.x},${s.y}`));
    const free = [];
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
      if(!occupied.has(`${x},${y}`)) free.push({x,y});
    }
    if(free.length===0) return null; // truly full = win
    return free[Math.floor(Math.random()*free.length)];
  }

  function ensureFood() {
    if (!food) {
      const f = spawnFood();
      if (!f) {
        // grid full = win
        state='win'; clearInterval(window._snakeInterval); window._snakeInterval=null;
        setMsg('you won — search for something →');
        showSearch();
      } else {
        food = f;
      }
    }
  }

  const setMsg   = t => { const m=document.getElementById('s-msg');   if(m) m.textContent=t; };
  const setScore = () => { const s=document.getElementById('s-score'); if(s) s.textContent=`score — ${score}`; };

  const showSearch = () => {
    const w = document.getElementById('snake-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('snake-search-input')?.focus(); }
  };

  canvas.addEventListener('click', () => {
    if (state==='idle') { state='playing'; setMsg(''); startLoop(); }
    else if (state==='dead'||state==='win') {
      clearInterval(interval); reset();
      const w=document.getElementById('snake-search-wrap'); if(w) w.style.display='none';
    }
  });

  window._snakeKeyHandler = e => {
    if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
    e.preventDefault();
    const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  };
  document.addEventListener('keydown', window._snakeKeyHandler);

  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (state==='idle') { state='playing'; setMsg(''); startLoop(); }
    else if (state==='dead'||state==='win') {
      clearInterval(interval); reset();
      const w=document.getElementById('snake-search-wrap'); if(w) w.style.display='none';
    }
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    if (!touchStart || state!=='playing') { touchStart=null; return; }
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let nd;
    if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    else nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }, {passive:true});

  function startLoop() {
    if (window._snakeInterval) clearInterval(window._snakeInterval);
    interval = setInterval(tick, SPEED);
    window._snakeInterval = interval;
  }

  function tick() {
    ensureFood();
    dir = nextDir;
    const head = {x: (snake[0].x+dir.x+COLS)%COLS, y: (snake[0].y+dir.y+ROWS)%ROWS};
    if (snake.some(s=>s.x===head.x&&s.y===head.y)) {
      state='dead'; clearInterval(interval);
      setMsg('game over — tap to play again'); return;
    }
    snake.unshift(head);
    if (food && head.x===food.x && head.y===food.y) {
      score+=10; setScore();
      food = null; // will be respawned by ensureFood next tick
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // Snake
    snake.forEach((s, i) => {
      ctx.globalAlpha = i===0 ? 0.85 : Math.max(0.25, 0.7 - (i/snake.length)*0.5);
      ctx.fillStyle = fg;
      const gap = 2;
      ctx.fillRect(s.x*CELL+gap, s.y*CELL+gap, CELL-gap*2, CELL-gap*2);
    });
    if (food) {
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL*0.22, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  reset(); draw();
}

function initTyping(visitCount) {
  const diff = Math.min(visitCount||0, 3);
  const wordList = TYPING_WORDS[diff];
  let words, current, correct, total;

  const wordEl  = document.getElementById('t-word');
  const input   = document.getElementById('t-input');
  const msgEl   = document.getElementById('t-msg');
  const scoreEl = document.getElementById('t-score');
  if (!wordEl||!input||!msgEl) return;

  const setMsg = t => { if(msgEl) msgEl.textContent=t; };
  const showSearch = () => {
    const w = document.getElementById('typing-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('typing-search-input')?.focus(); }
  };

  function start() {
    words = [...wordList].sort(()=>Math.random()-0.5).slice(0,8);
    correct=0; total=words.length; current=0;
    input.style.visibility='visible'; input.value='';
    setMsg(''); scoreEl.textContent=`0 / ${total}`;
    showWord();
  }

  function showWord() {
    if (current>=words.length) {
      wordEl.textContent='';
      input.style.visibility='hidden';
      setMsg('you won — search for something →');
      showSearch(); return;
    }
    const displayTimes = [1000, 600, 400, 250];
    const displayTime = displayTimes[Math.min(diff,3)];
    input.value=''; input.disabled=true; input.style.opacity='0.3';
    wordEl.style.transition='none';
    wordEl.style.opacity='1';
    wordEl.textContent = words[current];
    setTimeout(() => {
      wordEl.style.transition='opacity 0.3s';
      wordEl.style.opacity='0';
      setTimeout(() => {
        wordEl.textContent='_';
        wordEl.style.opacity='0.15';
        input.disabled=false; input.style.opacity='1';
        // On mobile, don't auto-focus (causes scroll jump), user taps the input
        if (window.innerWidth > 768) input.focus();
      }, 300);
    }, displayTime);
  }

  input.addEventListener('input', () => {
    const val = input.value.trim();
    if (val === words[current]) {
      correct++; current++;
      scoreEl.textContent=`${correct} / ${total}`;
      showWord();
    }
  });

  msgEl.addEventListener('click', start);
  msgEl.addEventListener('touchend', e => { e.preventDefault(); start(); }, {passive:false});
  document.getElementById('t-word')?.addEventListener('click', start);
}

function initMemoire(visitCount) {
  const diff = Math.min(visitCount||0, 3);
  const pairCounts = [4, 6, 8, 10];
  const pairs = pairCounts[diff];
  const cols = pairs <= 4 ? 4 : 4;

  const grid = document.getElementById('m-grid');
  const msgEl = document.getElementById('m-msg');
  const scoreEl = document.getElementById('m-score');
  if (!grid||!msgEl) return;

  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  let flipped=[], matched=0, locked=false;

  const setMsg = t => { if(msgEl) msgEl.textContent=t; };
  const showSearch = () => {
    const w = document.getElementById('memoire-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('memoire-search-input')?.focus(); }
  };

  function start() {
    matched=0; flipped=[]; locked=false;
    msgEl.style.display='none';
    const syms = MEMOIRE_SYMBOLS.slice(0,pairs);
    const deck = [...syms,...syms].sort(()=>Math.random()-0.5);
    grid.innerHTML = '';
    deck.forEach(sym => {
      const el = document.createElement('div');
      el.style.cssText = `aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:1px solid currentColor;opacity:0.12;cursor:pointer;transition:opacity 0.18s;user-select:none;-webkit-tap-highlight-color:transparent`;
      el.dataset.sym = sym;
      el.dataset.revealed = '0';
      el.textContent = '';
      el.addEventListener('click', () => flip(el));
      grid.appendChild(el);
    });
    scoreEl.textContent='pairs — 0';
  }

  function flip(el) {
    if (locked||el.dataset.revealed==='1'||flipped.includes(el)) return;
    el.textContent = el.dataset.sym;
    el.style.opacity='0.85';
    flipped.push(el);
    if (flipped.length===2) {
      locked=true;
      setTimeout(() => {
        if (flipped[0].dataset.sym===flipped[1].dataset.sym) {
          flipped.forEach(c=>{ c.dataset.revealed='1'; c.style.opacity='0.3'; c.style.cursor='default'; });
          matched++;
          scoreEl.textContent=`pairs — ${matched}`;
          if (matched===pairs) { setMsg('you won — search for something →'); msgEl.style.display=''; showSearch(); }
        } else {
          flipped.forEach(c=>{ c.style.opacity='0.12'; c.textContent=''; });
        }
        flipped=[]; locked=false;
      }, 800);
    }
  }

  msgEl.addEventListener('click', start);
  msgEl.addEventListener('touchend', e => { e.preventDefault(); start(); }, {passive:false});
}

function render2048(title) {
  const visits = parseInt(localStorage.getItem('2048-visits')||'0');
  localStorage.setItem('2048-visits', visits+1);
  setTimeout(() => init2048(visits), 80);
  return `
    <div class="game-wrap">
      <h1 class="game-title">${title||'2048'}</h1>
      <p class="game-score" id="g2-score">score — 0</p>
      <div id="g2-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;width:100%;max-width:320px;margin:0.5rem 0;touch-action:none"></div>
      <p class="game-msg" id="g2-msg" style="cursor:pointer">tap to start</p>
      <p style="font-family:'JetBrains Mono',monospace;font-size:0.55rem;opacity:0.28;text-align:center">flèches ou swipe</p>
      <div class="game-search" id="g2-search-wrap" style="display:none">
        <p style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;opacity:0.5;text-align:center">you won — search for something →</p>
        <input class="game-search-input" id="g2-search-input" placeholder="a word, a topic..." oninput="gameSearch(this.value)">
        <div class="game-search-results" id="game-search-results"></div>
      </div>
    </div>`;

function init2048(visitCount) {
  const grid = document.getElementById('g2-grid');
  const msgEl = document.getElementById('g2-msg');
  const scoreEl = document.getElementById('g2-score');
  if (!grid||!msgEl) return;

  // Target: 512 for beginners, 1024 normal, 2048 experienced
  const diff = Math.min(visitCount||0, 2);
  const TARGET = [512, 1024, 2048][diff];

  let board, score, state='idle', won=false;

  const setMsg = t => { if(msgEl) msgEl.textContent=t; };
  const showSearch = () => {
    const w = document.getElementById('g2-search-wrap');
    if (w) { w.style.display='flex'; document.getElementById('g2-search-input')?.focus(); }
  };

  function newBoard() {
    board = Array(4).fill(null).map(()=>Array(4).fill(0));
    score=0; won=false;
    addTile(); addTile();
    render();
  }

  function addTile() {
    const empty=[];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) empty.push([r,c]);
    if(!empty.length) return;
    const [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }

  function render() {
    scoreEl.textContent=`score — ${score}`;
    grid.innerHTML='';
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
      const v=board[r][c];
      const el=document.createElement('div');
      const op=v?0.15+Math.log2(v)*0.07:0.06;
      el.style.cssText=`aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:${v>=1024?'0.7rem':'0.85rem'};border:1px solid currentColor;opacity:${Math.min(op,0.95)};transition:opacity 0.15s`;
      el.textContent=v||'';
      grid.appendChild(el);
    }
  }

  function slide(row) {
    let a=row.filter(x=>x);
    for(let i=0;i<a.length-1;i++) {
      if(a[i]===a[i+1]){ a[i]*=2; score+=a[i]; a.splice(i+1,1); }
    }
    while(a.length<4) a.push(0);
    return a;
  }

  function move(dir) {
    if(state!=='playing') return;
    let moved=false;
    const b=board.map(r=>[...r]);
    if(dir==='left')  board=board.map(r=>{const s=slide(r);if(s.join()!==r.join())moved=true;return s;});
    if(dir==='right') board=board.map(r=>{const s=slide([...r].reverse()).reverse();if(s.join()!==r.join())moved=true;return s;});
    if(dir==='up'||dir==='down') {
      for(let c=0;c<4;c++){
        let col=board.map(r=>r[c]);
        if(dir==='down') col.reverse();
        const s=slide(col);
        if(dir==='down') s.reverse();
        s.forEach((v,r)=>{if(board[r][c]!==v)moved=true; board[r][c]=v;});
      }
    }
    if(!moved) return;
    addTile(); render();
    // Check win
    if(!won && board.flat().some(v=>v>=TARGET)) {
      won=true; state='won';
      setMsg('you won — search for something →');
      showSearch(); return;
    }
    // Check lose
    const hasMoves = board.flat().some(v=>!v) ||
      board.some((r,ri)=>r.some((v,ci)=>
        (ri<3&&board[ri+1][ci]===v)||(ci<3&&board[ri][ci+1]===v)
      ));
    if(!hasMoves) { state='idle'; setMsg('game over — tap to play again'); }
  }

  // Keyboard
  document.addEventListener('keydown', e=>{
    const map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down'};
    if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
  });

  // Touch swipe — use document to catch swipes anywhere
  let t2=null;
  document.addEventListener('touchstart',e=>{
    if(state!=='playing') return;
    t2=e.touches[0];
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!t2||state!=='playing') return;
    const dx=e.changedTouches[0].clientX-t2.clientX;
    const dy=e.changedTouches[0].clientY-t2.clientY;
    if(Math.abs(dx)<20&&Math.abs(dy)<20) return; // too small
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
    t2=null;
  },{passive:true});

  msgEl.addEventListener('click',()=>{
    if(state==='idle'||state==='won'){
      state='playing'; newBoard(); setMsg('');
      const w=document.getElementById('g2-search-wrap'); if(w) w.style.display='none';
    }
  });
  msgEl.addEventListener('touchend',e=>{
    e.preventDefault();
    if(state==='idle'||state==='won'){
      state='playing'; newBoard(); setMsg('');
      const w=document.getElementById('g2-search-wrap'); if(w) w.style.display='none';
    }
  },{passive:false});
}

let audioEls = [];
function initMultiAudio(count) {
  audioEls = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById(`audio-el-${i}`);
    if (!el) continue;
    audioEls[i] = el;
    ((idx, elem) => {
      elem.addEventListener('timeupdate', () => {
        if (!elem.duration) return;
        const pct = (elem.currentTime/elem.duration)*100;
        const f = document.getElementById(`pfill-${idx}`);
        const t = document.getElementById(`atime-${idx}`);
        if (f) f.style.width = pct+'%';
        if (t) t.textContent = `${fmt(elem.currentTime)} / ${fmt(elem.duration)}`;
      });
      elem.addEventListener('ended', () => setAudioIcon(idx, false));
    })(i, el);
  }
}
function toggleAudioPlay(i) {
  const el = audioEls[i] || document.getElementById(`audio-el-${i}`);
  if (!el) return;
  if (el.paused) { el.play().then(()=>setAudioIcon(i,true)).catch(e=>console.log(e)); }
  else { el.pause(); setAudioIcon(i, false); }
}
function setAudioIcon(i, playing) {
  const icon = document.getElementById(`play-icon-${i}`);
  if (!icon) return;
  icon.innerHTML = playing
    ? '<rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/>'
    : '<polygon points="0,0 10,6 0,12"/>';
}
function seekAudio(e, i) {
  const el = audioEls[i] || document.getElementById(`audio-el-${i}`);
  if (!el||!el.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  el.currentTime = ((e.clientX-r.left)/r.width)*el.duration;
}
// Legacy single-player support
function initAudio(d) { setTimeout(() => initMultiAudio(1), 50); }
function togglePlay() { toggleAudioPlay(0); }
function setIcon(p) { setAudioIcon(0, p); }
function fmt(s) {
  if (!s||isNaN(s)) return '—:——';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
</script>
